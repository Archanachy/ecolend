# EcoLend CI. Runs on every push/PR to main:
# install -> lint -> tests -> dependency audit -> XSS grep gate ->
# Semgrep SAST -> docker build.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---- Backend ----
      - name: Backend install
        run: npm ci
        working-directory: backend
      - name: Backend lint
        run: npm run lint
        working-directory: backend
      - name: Backend tests
        run: npm test
        working-directory: backend
      - name: Backend dependency audit
        run: npm audit --audit-level=high
        working-directory: backend

      # ---- Frontend ----
      - name: Frontend install
        run: npm ci
        working-directory: frontend
      - name: Frontend lint
        run: npm run lint
        working-directory: frontend
      - name: Frontend build
        run: npm run build
        working-directory: frontend
      # Vite/esbuild are dev-only build tooling and never ship in the built
      # app, so the frontend audit is scoped to production dependencies.
      - name: Frontend dependency audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

      # ---- Security gates ----
      - name: Ban dangerouslySetInnerHTML
        run: |
          if grep -rn "dangerouslySetInnerHTML" frontend/src backend/src; then
            echo "::error::dangerouslySetInnerHTML is banned project-wide (XSS risk)"
            exit 1
          fi
          echo "No dangerouslySetInnerHTML found."

      - name: Semgrep SAST
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan --config p/owasp-top-ten --error backend/src frontend/src

      # ---- Container build sanity ----
      - name: Docker build
        run: docker compose build
